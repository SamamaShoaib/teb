name: Build and Push to Amazon ECR

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ steps.login-ecr.outputs.registry }}/teb-backend:latest ./backend
        docker push ${{ steps.login-ecr.outputs.registry }}/teb-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ steps.login-ecr.outputs.registry }}/teb-frontend:latest ./front
        docker push ${{ steps.login-ecr.outputs.registry }}/teb-frontend:latest
